<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Michi</title>
    <!--LLamada del estilo css-->
    <link rel="stylesheet" href="tresEnRaya.css">
    <!--LLamada de los scripts-->
    <script src="tresEnRaya.js"></script>

    <!--Importacion de SweetAlert2-->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!--Importacion de iconos de Font Awesome-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.3.0/css/all.min.css">
</head>

<body>
    <main id="table">
        <div id="head">
            <h1>JUGADOR EN TURNO</h1>
            <h1 id="turno">BLANCAS</h1>
            <div class="wins">
                <h2 id="ww">Blancas: 0</h2>
                <h2 id="wb">Negras: 0</h2>
            </div>
        </div>
        <div class="tablero">
            <div class="fila uno">
                <div class="bloque uno" onclick="toggleCircle('0x0')">
                    <div class="circle" id="0x0">
                        <i class="fa-solid fa-heart"></i>
                    </div>
                </div>
                <div class="bloque dos" onclick="toggleCircle('0x1')">
                    <div class="circle" id="0x1">
                        <i class="fa-solid fa-heart"></i>
                    </div>
                </div>
                <div class="bloque tres" onclick="toggleCircle('0x2')">
                    <div class="circle" id="0x2">
                        <i class="fa-solid fa-heart"></i>
                    </div>
                </div>
            </div>
            <div class="fila dos">
                <div class="bloque uno" onclick="toggleCircle('1x0')">
                    <div class="circle" id="1x0">
                        <i class="fa-solid fa-heart"></i>
                    </div>
                </div>
                <div class="bloque dos" onclick="toggleCircle('1x1')">
                    <div class="circle" id="1x1">
                        <i class="fa-solid fa-heart"></i>
                    </div>
                </div>
                <div class="bloque tres" onclick="toggleCircle('1x2')">
                    <div class="circle" id="1x2">
                        <i class="fa-solid fa-heart"></i>
                    </div>
                </div>
            </div>
            <div class="fila tres">
                <div class="bloque uno" onclick="toggleCircle('2x0')">
                    <div class="circle" id="2x0">
                        <i class="fa-solid fa-heart"></i>
                    </div>
                </div>
                <div class="bloque dos" onclick="toggleCircle('2x1')">
                    <div class="circle" id="2x1">
                        <i class="fa-solid fa-heart"></i>
                    </div>
                </div>
                <div class="bloque tres" onclick="toggleCircle('2x2')">
                    <div class="circle" id="2x2">
                        <i class="fa-solid fa-heart"></i>
                    </div>
                </div>
            </div>
        </div>
        <div class="bot">
            Activar Bot
            <div class="activar">
                <!--Por implementar-->
            </div>
        </div>
    </main>
</body>

</html>
